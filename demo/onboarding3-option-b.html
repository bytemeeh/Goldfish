<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onboarding 3 — Option B: Orbiting Rings</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0C0A09;
            font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #F5F0EB;
        }

        .label {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 13px;
            color: rgba(245, 240, 235, .4);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .phone {
            width: 375px;
            height: 812px;
            border: 3px solid #333;
            border-radius: 55px;
            overflow: hidden;
            position: relative;
            background: #1E1815;
        }

        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 34px;
            background: #0C0A09;
            border-radius: 0 0 20px 20px;
            z-index: 10;
        }

        .screen {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #1E1815;
            padding: 60px 28px 36px;
        }

        /* === ORBITING RINGS === */
        .orbit-area {
            flex: 1;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .orbit-area svg {
            width: 100%;
            max-width: 320px;
        }

        @keyframes orbit-slow {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @keyframes orbit-reverse {
            from {
                transform: rotate(360deg);
            }

            to {
                transform: rotate(0deg);
            }
        }

        .ring-family {
            animation: orbit-reverse 30s linear infinite;
            transform-origin: 160px 175px;
        }

        .ring-friends {
            animation: orbit-slow 24s linear infinite;
            transform-origin: 160px 175px;
        }

        .ring-work {
            animation: orbit-reverse 36s linear infinite;
            transform-origin: 160px 175px;
        }

        .text-area {
            text-align: center;
            padding: 0 8px 0;
        }

        .text-area h2 {
            font-size: 22px;
            font-weight: 300;
            color: #F5F0EB;
            letter-spacing: -.3px;
            margin-bottom: 6px;
        }

        .text-area p {
            font-size: 13px;
            color: rgba(245, 240, 235, .45);
            font-weight: 300;
            line-height: 1.5;
        }

        .bottom-area {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .dots {
            display: flex;
            gap: 10px;
            margin: 20px 0 16px;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            border: 1.5px solid rgba(245, 240, 235, .2);
            background: transparent;
        }

        .dot.active {
            background: #B74F3A;
            border-color: #B74F3A;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 100px;
            background: rgba(255, 255, 255, .08);
            color: #F5F0EB;
            font-size: 15px;
            font-weight: 400;
            font-family: inherit;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="label">Option B — Orbiting Rings</div>
    <div class="phone">
        <div class="notch"></div>
        <div class="screen">

            <div class="orbit-area">
                <svg viewBox="0 0 320 350">
                    <!-- Orbital ring tracks -->
                    <circle cx="160" cy="175" r="60" fill="none" stroke="#B74F3A" stroke-width=".4" opacity=".18" />
                    <circle cx="160" cy="175" r="100" fill="none" stroke="#3D6B8E" stroke-width=".4" opacity=".15" />
                    <circle cx="160" cy="175" r="140" fill="none" stroke="#8B7D3C" stroke-width=".35" opacity=".12" />

                    <!-- Ring labels (static) -->
                    <text x="160" y="108" text-anchor="middle" font-size="9" fill="#B74F3A" opacity=".45"
                        font-weight="300">Family</text>
                    <text x="160" y="68" text-anchor="middle" font-size="9" fill="#3D6B8E" opacity=".4"
                        font-weight="300">Friends</text>
                    <text x="160" y="28" text-anchor="middle" font-size="9" fill="#8B7D3C" opacity=".35"
                        font-weight="300">Work</text>

                    <!-- CENTER glow + fish -->
                    <circle cx="160" cy="175" r="18" fill="#B74F3A" opacity=".06">
                        <animate attributeName="r" values="18;26;18" dur="4s" repeatCount="indefinite" />
                        <animate attributeName="opacity" values=".06;.02;.06" dur="4s" repeatCount="indefinite" />
                    </circle>
                    <circle cx="160" cy="175" r="12" fill="#B74F3A" opacity=".15" />
                    <circle cx="160" cy="175" r="7" fill="#B74F3A" opacity=".35" />
                    <text x="160" y="178.5" text-anchor="middle" font-size="8" fill="#F5F0EB">🐠</text>

                    <!-- FAMILY orbit (r=60) — animated group -->
                    <g class="ring-family">
                        <circle cx="220" cy="175" r="7" fill="#B74F3A" opacity=".2" />
                        <circle cx="220" cy="175" r="4" fill="#B74F3A" opacity=".6" />
                        <text x="220" y="178" text-anchor="middle" font-size="5.5" fill="#F5F0EB">👩‍🍳</text>

                        <circle cx="130" cy="125" r="6.5" fill="#B74F3A" opacity=".18" />
                        <circle cx="130" cy="125" r="3.5" fill="#B74F3A" opacity=".55" />
                        <text x="130" y="128" text-anchor="middle" font-size="5.5" fill="#F5F0EB">👨</text>

                        <circle cx="150" cy="233" r="5.5" fill="#B74F3A" opacity=".13" />
                        <circle cx="150" cy="233" r="3" fill="#B74F3A" opacity=".45" />
                        <text x="150" y="236" text-anchor="middle" font-size="5" fill="#F5F0EB">👧</text>
                    </g>

                    <!-- FRIENDS orbit (r=100) — animated group -->
                    <g class="ring-friends">
                        <circle cx="260" cy="175" r="7" fill="#3D6B8E" opacity=".2" />
                        <circle cx="260" cy="175" r="4" fill="#3D6B8E" opacity=".6" />
                        <text x="260" y="178" text-anchor="middle" font-size="5.5" fill="#F5F0EB">🎨</text>

                        <circle cx="100" cy="100" r="6.5" fill="#3D6B8E" opacity=".18" />
                        <circle cx="100" cy="100" r="3.5" fill="#3D6B8E" opacity=".55" />
                        <text x="100" y="103" text-anchor="middle" font-size="5.5" fill="#F5F0EB">✈️</text>

                        <circle cx="190" cy="272" r="5" fill="#3D6B8E" opacity=".1" />
                        <circle cx="130" cy="262" r="5" fill="#3D6B8E" opacity=".1" />
                    </g>

                    <!-- WORK orbit (r=140) — animated group -->
                    <g class="ring-work">
                        <circle cx="300" cy="175" r="6" fill="#8B7D3C" opacity=".18" />
                        <circle cx="300" cy="175" r="3.5" fill="#8B7D3C" opacity=".5" />
                        <text x="300" y="178" text-anchor="middle" font-size="5" fill="#F5F0EB">MF</text>

                        <circle cx="80" cy="60" r="6" fill="#8B7D3C" opacity=".18" />
                        <circle cx="80" cy="60" r="3.5" fill="#8B7D3C" opacity=".5" />
                        <text x="80" y="63" text-anchor="middle" font-size="5" fill="#F5F0EB">NV</text>

                        <circle cx="220" cy="310" r="4" fill="#8B7D3C" opacity=".08" />
                    </g>
                </svg>
            </div>

            <div class="text-area">
                <h2>Your living network</h2>
                <p>Everyone orbits around you — family close,<br>friends and colleagues further out.</p>
            </div>

            <div class="bottom-area">
                <div class="dots">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot active"></div>
                </div>
                <button class="btn">Let's go</button>
            </div>

        </div>
    </div>
</body>

</html>
