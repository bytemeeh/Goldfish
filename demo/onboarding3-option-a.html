<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onboarding 3 — Option A: Constellation Map</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0C0A09;
            font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #F5F0EB;
        }

        .label {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 13px;
            color: rgba(245, 240, 235, .4);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .phone {
            width: 375px;
            height: 812px;
            border: 3px solid #333;
            border-radius: 55px;
            overflow: hidden;
            position: relative;
            background: #1E1815;
        }

        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 34px;
            background: #0C0A09;
            border-radius: 0 0 20px 20px;
            z-index: 10;
        }

        .screen {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #1E1815;
            padding: 60px 28px 36px;
        }

        /* === CONSTELLATION MAP === */
        .constellation-area {
            flex: 1;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .constellation-area svg {
            width: 100%;
            max-width: 320px;
        }

        /* Twinkling animation */
        @keyframes twinkle {

            0%,
            100% {
                opacity: 0.15;
            }

            50% {
                opacity: 0.45;
            }
        }

        .ghost {
            animation: twinkle 3s ease-in-out infinite;
        }

        .ghost:nth-child(2) {
            animation-delay: .5s;
        }

        .ghost:nth-child(3) {
            animation-delay: 1s;
        }

        .ghost:nth-child(4) {
            animation-delay: 1.5s;
        }

        @keyframes pulse-ring {
            0% {
                r: 6;
                opacity: 0.35;
            }

            100% {
                r: 14;
                opacity: 0;
            }
        }

        .text-area {
            text-align: center;
            padding: 0 8px 0;
        }

        .text-area h2 {
            font-size: 22px;
            font-weight: 300;
            color: #F5F0EB;
            letter-spacing: -.3px;
            margin-bottom: 6px;
        }

        .text-area p {
            font-size: 13px;
            color: rgba(245, 240, 235, .45);
            font-weight: 300;
            line-height: 1.5;
            margin-bottom: 0;
        }

        .pond-legend {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 20px 0 0;
        }

        .pond-legend span {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: rgba(245, 240, 235, .45);
            letter-spacing: .5px;
        }

        .pond-legend .dot-legend {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .bottom-area {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .dots {
            display: flex;
            gap: 10px;
            margin: 20px 0 16px;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            border: 1.5px solid rgba(245, 240, 235, .2);
            background: transparent;
        }

        .dot.active {
            background: #B74F3A;
            border-color: #B74F3A;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 100px;
            background: rgba(255, 255, 255, .08);
            color: #F5F0EB;
            font-size: 15px;
            font-weight: 400;
            font-family: inherit;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="label">Option A — Constellation Map</div>
    <div class="phone">
        <div class="notch"></div>
        <div class="screen">

            <div class="constellation-area">
                <svg viewBox="0 0 320 360">
                    <!-- Starfield background dots -->
                    <circle cx="20" cy="30" r=".8" fill="#F5F0EB" opacity=".08" />
                    <circle cx="290" cy="50" r=".6" fill="#F5F0EB" opacity=".06" />
                    <circle cx="150" cy="20" r=".7" fill="#F5F0EB" opacity=".07" />
                    <circle cx="60" cy="310" r=".5" fill="#F5F0EB" opacity=".05" />
                    <circle cx="260" cy="340" r=".7" fill="#F5F0EB" opacity=".06" />
                    <circle cx="40" cy="180" r=".6" fill="#F5F0EB" opacity=".07" />
                    <circle cx="300" cy="200" r=".5" fill="#F5F0EB" opacity=".05" />

                    <!-- FAMILY constellation (top-left) -->
                    <line x1="85" y1="90" x2="110" y2="130" stroke="#B74F3A" stroke-width=".6" opacity=".25" />
                    <line x1="110" y1="130" x2="65" y2="145" stroke="#B74F3A" stroke-width=".6" opacity=".25" />
                    <line x1="85" y1="90" x2="65" y2="145" stroke="#B74F3A" stroke-width=".5" opacity=".15" />
                    <circle cx="85" cy="90" r="8" fill="#B74F3A" opacity=".2" />
                    <circle cx="85" cy="90" r="4.5" fill="#B74F3A" opacity=".6" />
                    <text x="85" y="93" text-anchor="middle" font-size="6" fill="#F5F0EB">👩‍🍳</text>
                    <circle cx="110" cy="130" r="7" fill="#B74F3A" opacity=".18" />
                    <circle cx="110" cy="130" r="4" fill="#B74F3A" opacity=".55" />
                    <text x="110" y="133" text-anchor="middle" font-size="6" fill="#F5F0EB">👨</text>
                    <circle cx="65" cy="145" r="6" fill="#B74F3A" opacity=".15" />
                    <circle cx="65" cy="145" r="3.5" fill="#B74F3A" opacity=".5" />
                    <text x="65" y="148" text-anchor="middle" font-size="5" fill="#F5F0EB">👧</text>
                    <text x="90" y="75" font-size="9" fill="#B74F3A" opacity=".5" font-weight="300">Family</text>

                    <!-- FRIENDS constellation (top-right) -->
                    <line x1="230" y1="80" x2="255" y2="120" stroke="#3D6B8E" stroke-width=".6" opacity=".25" />
                    <line x1="255" y1="120" x2="270" y2="85" stroke="#3D6B8E" stroke-width=".5" opacity=".18" />
                    <line x1="230" y1="80" x2="200" y2="110" stroke="#3D6B8E" stroke-width=".5" opacity=".15" />
                    <circle cx="230" cy="80" r="8" fill="#3D6B8E" opacity=".2" />
                    <circle cx="230" cy="80" r="4.5" fill="#3D6B8E" opacity=".6" />
                    <text x="230" y="83" text-anchor="middle" font-size="6" fill="#F5F0EB">🎨</text>
                    <circle cx="255" cy="120" r="7" fill="#3D6B8E" opacity=".18" />
                    <circle cx="255" cy="120" r="4" fill="#3D6B8E" opacity=".55" />
                    <text x="255" y="123" text-anchor="middle" font-size="6" fill="#F5F0EB">✈️</text>
                    <circle cx="270" cy="85" r="5" fill="#3D6B8E" opacity=".12" class="ghost" />
                    <circle cx="200" cy="110" r="5" fill="#3D6B8E" opacity=".12" class="ghost" />
                    <text x="235" y="65" font-size="9" fill="#3D6B8E" opacity=".5" font-weight="300">Friends</text>

                    <!-- WORK constellation (bottom-center) -->
                    <line x1="150" y1="250" x2="185" y2="270" stroke="#8B7D3C" stroke-width=".6" opacity=".25" />
                    <line x1="150" y1="250" x2="130" y2="280" stroke="#8B7D3C" stroke-width=".5" opacity=".18" />
                    <circle cx="150" cy="250" r="7" fill="#8B7D3C" opacity=".18" />
                    <circle cx="150" cy="250" r="4" fill="#8B7D3C" opacity=".55" />
                    <text x="150" y="253" text-anchor="middle" font-size="5.5" fill="#F5F0EB">MF</text>
                    <circle cx="185" cy="270" r="7" fill="#8B7D3C" opacity=".18" />
                    <circle cx="185" cy="270" r="4" fill="#8B7D3C" opacity=".55" />
                    <text x="185" y="273" text-anchor="middle" font-size="5.5" fill="#F5F0EB">NV</text>
                    <circle cx="130" cy="280" r="5" fill="#8B7D3C" opacity=".12" class="ghost" />
                    <text x="155" y="235" font-size="9" fill="#8B7D3C" opacity=".5" font-weight="300">Work</text>

                    <!-- CENTER — You (goldfish) with pulse -->
                    <circle cx="160" cy="180" r="10" fill="#B74F3A" opacity=".08">
                        <animate attributeName="r" values="10;22;10" dur="3s" repeatCount="indefinite" />
                        <animate attributeName="opacity" values=".08;.02;.08" dur="3s" repeatCount="indefinite" />
                    </circle>
                    <circle cx="160" cy="180" r="12" fill="#B74F3A" opacity=".15" />
                    <circle cx="160" cy="180" r="7" fill="#B74F3A" opacity=".35" />
                    <text x="160" y="183.5" text-anchor="middle" font-size="8" fill="#F5F0EB">🐠</text>

                    <!-- Faint connecting lines from center to constellations -->
                    <line x1="160" y1="180" x2="110" y2="130" stroke="#F5F0EB" stroke-width=".3" opacity=".08"
                        stroke-dasharray="4 6" />
                    <line x1="160" y1="180" x2="240" y2="100" stroke="#F5F0EB" stroke-width=".3" opacity=".08"
                        stroke-dasharray="4 6" />
                    <line x1="160" y1="180" x2="160" y2="255" stroke="#F5F0EB" stroke-width=".3" opacity=".08"
                        stroke-dasharray="4 6" />
                </svg>
            </div>

            <div class="text-area">
                <h2>Your constellation</h2>
                <p>Each circle of people forms its own cluster,<br>all connected through you.</p>
                <div class="pond-legend">
                    <span>
                        <div class="dot-legend" style="background:#B74F3A"></div>Family
                    </span>
                    <span>
                        <div class="dot-legend" style="background:#3D6B8E"></div>Friends
                    </span>
                    <span>
                        <div class="dot-legend" style="background:#8B7D3C"></div>Work
                    </span>
                </div>
            </div>

            <div class="bottom-area">
                <div class="dots">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot active"></div>
                </div>
                <button class="btn">Let's go</button>
            </div>

        </div>
    </div>
</body>

</html>
