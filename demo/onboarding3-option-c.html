<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onboarding 3 — Option C: Three Ponds</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0C0A09;
            font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #F5F0EB;
        }

        .label {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 13px;
            color: rgba(245, 240, 235, .4);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .phone {
            width: 375px;
            height: 812px;
            border: 3px solid #333;
            border-radius: 55px;
            overflow: hidden;
            position: relative;
            background: #1E1815;
        }

        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 34px;
            background: #0C0A09;
            border-radius: 0 0 20px 20px;
            z-index: 10;
        }

        .screen {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #1E1815;
            padding: 60px 28px 36px;
        }

        /* === THREE PONDS (WATERCOLOR ISLANDS) === */
        .ponds-area {
            flex: 1;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .ponds-area svg {
            width: 100%;
            max-width: 320px;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-4px);
            }
        }

        .pond-family {
            animation: float 5s ease-in-out infinite;
        }

        .pond-friends {
            animation: float 5s ease-in-out 1.5s infinite;
        }

        .pond-work {
            animation: float 5s ease-in-out 3s infinite;
        }

        .text-area {
            text-align: center;
            padding: 0 8px 0;
        }

        .text-area h2 {
            font-size: 22px;
            font-weight: 300;
            color: #F5F0EB;
            letter-spacing: -.3px;
            margin-bottom: 6px;
        }

        .text-area p {
            font-size: 13px;
            color: rgba(245, 240, 235, .45);
            font-weight: 300;
            line-height: 1.5;
        }

        .pond-cards {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            width: 100%;
        }

        .pond-card {
            flex: 1;
            background: rgba(255, 255, 255, .04);
            border: 1px solid rgba(255, 255, 255, .06);
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;
        }

        .pond-card .count {
            font-size: 18px;
            font-weight: 200;
            color: #F5F0EB;
            margin-bottom: 2px;
        }

        .pond-card .label-text {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .bottom-area {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .dots {
            display: flex;
            gap: 10px;
            margin: 20px 0 16px;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            border: 1.5px solid rgba(245, 240, 235, .2);
            background: transparent;
        }

        .dot.active {
            background: #B74F3A;
            border-color: #B74F3A;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 100px;
            background: rgba(255, 255, 255, .08);
            color: #F5F0EB;
            font-size: 15px;
            font-weight: 400;
            font-family: inherit;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="label">Option C — Three Ponds</div>
    <div class="phone">
        <div class="notch"></div>
        <div class="screen">

            <div class="ponds-area">
                <svg viewBox="0 0 320 380">
                    <!-- Connection from center to each pond -->
                    <line x1="160" y1="200" x2="95" y2="100" stroke="#F5F0EB" stroke-width=".3" opacity=".06"
                        stroke-dasharray="3 5" />
                    <line x1="160" y1="200" x2="235" y2="105" stroke="#F5F0EB" stroke-width=".3" opacity=".06"
                        stroke-dasharray="3 5" />
                    <line x1="160" y1="200" x2="160" y2="310" stroke="#F5F0EB" stroke-width=".3" opacity=".06"
                        stroke-dasharray="3 5" />

                    <!-- FAMILY pond -->
                    <g class="pond-family">
                        <!-- Organic blob shape -->
                        <path d="M60,95 Q65,55 100,60 Q135,65 130,100 Q125,135 95,140 Q55,135 60,95Z" fill="#B74F3A"
                            opacity=".08" stroke="#B74F3A" stroke-width=".5" opacity=".2" />
                        <!-- Members -->
                        <circle cx="82" cy="88" r="7" fill="#B74F3A" opacity=".2" />
                        <circle cx="82" cy="88" r="4" fill="#B74F3A" opacity=".6" />
                        <text x="82" y="91" text-anchor="middle" font-size="5.5" fill="#F5F0EB">👩‍🍳</text>
                        <circle cx="108" cy="95" r="6.5" fill="#B74F3A" opacity=".18" />
                        <circle cx="108" cy="95" r="3.5" fill="#B74F3A" opacity=".55" />
                        <text x="108" y="98" text-anchor="middle" font-size="5.5" fill="#F5F0EB">👨</text>
                        <circle cx="90" cy="118" r="5.5" fill="#B74F3A" opacity=".13" />
                        <circle cx="90" cy="118" r="3" fill="#B74F3A" opacity=".45" />
                        <text x="90" y="121" text-anchor="middle" font-size="5" fill="#F5F0EB">👧</text>
                        <text x="95" y="55" font-size="9" fill="#B74F3A" opacity=".5" font-weight="300"
                            text-anchor="middle">Family</text>
                    </g>

                    <!-- FRIENDS pond -->
                    <g class="pond-friends">
                        <path d="M200,85 Q205,55 240,60 Q275,70 270,105 Q265,140 235,140 Q200,130 200,85Z"
                            fill="#3D6B8E" opacity=".08" stroke="#3D6B8E" stroke-width=".5" opacity=".18" />
                        <circle cx="228" cy="88" r="7" fill="#3D6B8E" opacity=".2" />
                        <circle cx="228" cy="88" r="4" fill="#3D6B8E" opacity=".6" />
                        <text x="228" y="91" text-anchor="middle" font-size="5.5" fill="#F5F0EB">🎨</text>
                        <circle cx="250" cy="100" r="6.5" fill="#3D6B8E" opacity=".18" />
                        <circle cx="250" cy="100" r="3.5" fill="#3D6B8E" opacity=".55" />
                        <text x="250" y="103" text-anchor="middle" font-size="5.5" fill="#F5F0EB">✈️</text>
                        <circle cx="220" cy="115" r="5" fill="#3D6B8E" opacity=".1" />
                        <circle cx="245" cy="120" r="4.5" fill="#3D6B8E" opacity=".08" />
                        <text x="237" y="60" font-size="9" fill="#3D6B8E" opacity=".5" font-weight="300"
                            text-anchor="middle">Friends</text>
                    </g>

                    <!-- WORK pond -->
                    <g class="pond-work">
                        <path d="M125,290 Q130,260 165,262 Q200,265 195,300 Q190,335 160,338 Q125,330 125,290Z"
                            fill="#8B7D3C" opacity=".08" stroke="#8B7D3C" stroke-width=".5" opacity=".18" />
                        <circle cx="152" cy="290" r="6.5" fill="#8B7D3C" opacity=".18" />
                        <circle cx="152" cy="290" r="3.5" fill="#8B7D3C" opacity=".55" />
                        <text x="152" y="293" text-anchor="middle" font-size="5" fill="#F5F0EB">MF</text>
                        <circle cx="175" cy="305" r="6.5" fill="#8B7D3C" opacity=".18" />
                        <circle cx="175" cy="305" r="3.5" fill="#8B7D3C" opacity=".55" />
                        <text x="175" y="308" text-anchor="middle" font-size="5" fill="#F5F0EB">NV</text>
                        <circle cx="155" cy="318" r="4.5" fill="#8B7D3C" opacity=".08" />
                        <text x="160" y="258" font-size="9" fill="#8B7D3C" opacity=".5" font-weight="300"
                            text-anchor="middle">Work</text>
                    </g>

                    <!-- CENTER — Goldfish -->
                    <circle cx="160" cy="200" r="16" fill="#B74F3A" opacity=".06">
                        <animate attributeName="r" values="16;22;16" dur="4s" repeatCount="indefinite" />
                        <animate attributeName="opacity" values=".06;.02;.06" dur="4s" repeatCount="indefinite" />
                    </circle>
                    <circle cx="160" cy="200" r="11" fill="#B74F3A" opacity=".12" />
                    <circle cx="160" cy="200" r="7" fill="#B74F3A" opacity=".3" />
                    <text x="160" y="203.5" text-anchor="middle" font-size="8" fill="#F5F0EB">🐠</text>
                </svg>
            </div>

            <div class="text-area">
                <h2>Three ponds. One map.</h2>
                <p>Your contacts group naturally into circles.<br>Drag, zoom, and explore.</p>
            </div>
            <div class="pond-cards">
                <div class="pond-card">
                    <div class="count" style="color:#B74F3A">3</div>
                    <div class="label-text" style="color:rgba(183,79,58,.5)">Family</div>
                </div>
                <div class="pond-card">
                    <div class="count" style="color:#3D6B8E">2</div>
                    <div class="label-text" style="color:rgba(61,107,142,.5)">Friends</div>
                </div>
                <div class="pond-card">
                    <div class="count" style="color:#8B7D3C">2</div>
                    <div class="label-text" style="color:rgba(139,125,60,.5)">Work</div>
                </div>
            </div>

            <div class="bottom-area">
                <div class="dots">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot active"></div>
                </div>
                <button class="btn">Let's go</button>
            </div>

        </div>
    </div>
</body>

</html>
