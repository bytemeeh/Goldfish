name: Goldfish
options:
  bundleIdPrefix: com.goldfish
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  Goldfish:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
        group: App
      - path: Models
        group: Models
      - path: Services
        group: Services
      - path: Views
        group: Views
      - path: ViewModels
        group: ViewModels
      - path: Assets/GoldfishColors.swift
        group: Assets
    resources:
      - path: Goldfish/Assets.xcassets
      - path: Assets/EmptyStates
        buildPhase: resources
      - path: Goldfish/PrivacyInfo.xcprivacy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.goldfish.app
        PRODUCT_NAME: Goldfish
        INFOPLIST_FILE: Goldfish/Info.plist
        CODE_SIGN_ENTITLEMENTS: Goldfish/Goldfish.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: true
        ENABLE_PREVIEWS: true
    entitlements:
      path: Goldfish/Goldfish.entitlements
    info:
      path: Goldfish/Info.plist
    dependencies: []
    scheme:
      testTargets:
        - GoldfishTests
      gatherCoverageData: true

  GoldfishTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
        group: Tests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.goldfish.app.tests
        PRODUCT_NAME: GoldfishTests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Goldfish.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Goldfish"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: Goldfish
